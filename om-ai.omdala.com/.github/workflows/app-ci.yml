name: App CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "shared/**"
      - "scripts/e2e-app-mvp-smoke.sh"
      - "scripts/verify-app.sh"
      - ".github/workflows/app-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "shared/**"
      - "scripts/e2e-app-mvp-smoke.sh"
      - "scripts/verify-app.sh"
      - ".github/workflows/app-ci.yml"

jobs:
  app-test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install root deps
        run: npm install

      - name: Install app deps
        run: npm run app:install

      - name: Run app verify
        run: npm run verify:app

      - name: Run app MVP smoke
        env:
          API_BASE_URL: https://api.omdala.com
        run: npm run e2e:app:mvp
