name: Omniverse API — CI + Deploy

on:
  push:
    branches:
      - main
      - feat/omniverse-auth-o1-o2
  pull_request:
    branches:
      - main

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omniverse.omdala.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: omniverse.omdala.com/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

  # ── Deploy preview (non-main branches) ────────────────────────────────────
  deploy-preview:
    name: Deploy to preview Worker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    defaults:
      run:
        working-directory: omniverse.omdala.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: omniverse.omdala.com/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "93112cc89181e75335cbd7ef7e392ba3"
        run: npx wrangler deploy --env preview

  # ── Deploy production (main only) ─────────────────────────────────────────
  deploy-production:
    name: Deploy to production Worker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: omniverse.omdala.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: omniverse.omdala.com/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "93112cc89181e75335cbd7ef7e392ba3"
        run: npx wrangler deploy --env production
