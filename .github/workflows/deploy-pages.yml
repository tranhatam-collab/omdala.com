name: Deploy Pages

on:
  workflow_dispatch:
    inputs:
      surface:
        description: Which OMDALA surface to deploy
        required: true
        default: web
        type: choice
        options:
          - web
          - app
          - admin
          - docs
      deploy_branch:
        description: Cloudflare Pages branch label
        required: true
        default: preview
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: 93112cc89181e75335cbd7ef7e392ba3
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Wrangler
        run: npm install -g wrangler@4.75.0

      - name: Deploy selected surface
        run: node scripts/cloudflare-pages-deploy.mjs "${{ inputs.surface }}" "${{ inputs.deploy_branch }}"
