name            = "omdala-api"
main            = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id      = "f3f9e76222dcb488d5e303e29e8ba192"
workers_dev     = true

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "b9c4907f49ca48cc9ee489013c3aa033"

[vars]
ENVIRONMENT = "production"
APP_BASE_URL = "https://app.omdala.com"
WEB_BASE_URL = "https://omdala.com"

[env.preview.vars]
ENVIRONMENT = "preview"
APP_BASE_URL = "https://preview.app.omdala.com"
WEB_BASE_URL = "https://preview.omdala.com"

[env.staging.vars]
ENVIRONMENT = "staging"
APP_BASE_URL = "https://staging.app.omdala.com"
WEB_BASE_URL = "https://staging.omdala.com"

# api.omdala.com production route
[[routes]]
pattern = "api.omdala.com/*"
zone_name = "omdala.com"
